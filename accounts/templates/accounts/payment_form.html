<!DOCTYPE html>
<html>
<head>
    <title>M-Pesa Payment | The Handymen</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f4f4; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .payment-card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        .mpesa-logo { width: 150px; margin-bottom: 20px; }
        .amount { font-size: 24px; font-weight: bold; color: #28a745; margin: 10px 0; }
        input[type="text"] { width: 100%; padding: 12px; margin: 20px 0; border: 1px solid #ddd; border-radius: 6px; font-size: 16px; box-sizing: border-box; }
        .btn-pay { background-color: #28a745; color: white; border: none; padding: 15px; width: 100%; border-radius: 6px; font-size: 18px; cursor: pointer; font-weight: bold; }
        .btn-pay:hover { background-color: #218838; }
        .cancel-link { display: block; margin-top: 15px; color: #666; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>
    <div class="payment-card">
        <img src="https://upload.wikimedia.org" class="mpesa-logo" alt="M-Pesa">
        <h2>Secure Escrow Payment</h2>
        <p>Paying for: <strong>{{ job.title }}</strong></p>
        <div class="amount">KES {{ job.price }}</div>

        <form method="post">
            {% csrf_token %}
            <label style="display: block; text-align: left; font-size: 14px; color: #555;">Enter M-Pesa Number:</label>
            <input type="text" name="phone_number" placeholder="2547XXXXXXXX" required>
            <p style="font-size: 12px; color: #888;">A prompt will be sent to this phone to enter your PIN.</p>
            <button type="submit" class="btn-pay">Pay & Hold in Escrow</button>
        </form>

        <a href="{% url 'dashboard' %}" class="cancel-link">Cancel and go back</a>
    </div>
</body>
</html>
