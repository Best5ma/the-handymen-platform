{% extends 'base.html' %}
{% block title %}Reset Password{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow-sm border-0 mt-5" style="border-radius: 15px;">
            <div class="card-body p-4 text-center">
                <h3 class="fw-bold mb-3">Forgot Password?</h3>
                <p class="text-muted small mb-4">Enter your email address below. We'll send you a secure link to reset your password.</p>

                <form method="post">
                    {% csrf_token %}
                    <div class="text-start mb-3">
                        {{ form.as_p }}
                    </div>
                    <button type="submit" class="btn btn-primary w-100 fw-bold py-2">Send Reset Link</button>
                </form>

                <div class="mt-3">
                    <a href="{% url 'login' %}" class="text-decoration-none small">← Back to Login</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
