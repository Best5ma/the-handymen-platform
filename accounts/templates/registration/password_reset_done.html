{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 text-center mt-5">
        <div class="alert alert-info shadow-sm p-5" style="border-radius: 15px;">
            <h2 class="mb-3">📧 Check Your Inbox</h2>
            <p>We've sent an email with instructions to reset your password. If it doesn't appear soon, check your spam or junk folder.</p>
            <hr>
            <a href="{% url 'login' %}" class="btn btn-outline-info btn-sm">Return to Login</a>
        </div>
    </div>
</div>
{% endblock %}
