{% extends 'base.html' %}
{% block title %}Enter New Password{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow-sm border-0 mt-5" style="border-radius: 15px;">
            <div class="card-body p-4">
                <h3 class="text-center fw-bold mb-3">Set New Password</h3>
                <p class="text-center text-muted small mb-4">Please enter your new password twice to confirm.</p>

                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        {{ form.as_p }}
                    </div>
                    <button type="submit" class="btn btn-success w-100 fw-bold py-2">Save New Password</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
