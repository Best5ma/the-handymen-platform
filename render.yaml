services:
  - type: web
    name: the-handymen-platform
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn handyman_project.wsgi:application
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: the-handymen-db
          property: connectionString
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false

databases:
  - name: the-handymen-db
    plan: free